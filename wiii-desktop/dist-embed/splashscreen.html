<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiii</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @font-face {
    font-family: 'Inter';
    src: local('Inter'), local('Inter-Regular');
    font-weight: 400;
  }

  body {
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0d0d14;
    color: #fff;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .splash {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    -webkit-app-region: drag;
  }

  /* Subtle ambient glow */
  .splash::before {
    content: '';
    position: absolute;
    width: 260px;
    height: 260px;
    background: radial-gradient(circle, rgba(255,165,0,0.08) 0%, transparent 70%);
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -60%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -60%) scale(1.1); }
  }

  .logo-container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .logo-icon {
    width: 72px;
    height: 72px;
    border-radius: 18px;
    animation: fadeInScale 0.6s ease-out;
  }

  .logo-fallback {
    width: 72px;
    height: 72px;
    border-radius: 18px;
    background: linear-gradient(135deg, #ff8c00, #ff6600);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: 700;
    color: #fff;
    animation: fadeInScale 0.6s ease-out;
  }

  @keyframes fadeInScale {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }

  .brand-name {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: #fff;
    animation: fadeIn 0.8s ease-out 0.2s both;
  }

  .brand-sub {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
    animation: fadeIn 0.8s ease-out 0.4s both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Progress bar */
  .progress-area {
    position: absolute;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    z-index: 1;
    animation: fadeIn 0.6s ease-out 0.6s both;
  }

  .progress-track {
    width: 200px;
    height: 3px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff8c00, #ffa033);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .progress-text {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.35);
    min-height: 16px;
  }

  /* Version */
  .version {
    position: absolute;
    bottom: 16px;
    right: 20px;
    font-size: 10px;
    color: rgba(255, 255, 255, 0.2);
    z-index: 1;
  }
</style>
</head>
<body>
  <div class="splash">
    <div class="logo-container">
      <div class="logo-fallback" id="logo-fallback">W</div>
      <div class="brand-name">Wiii</div>
      <div class="brand-sub">by The Wiii Lab</div>
    </div>

    <div class="progress-area">
      <div class="progress-track">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="progress-text" id="progress-text">Khởi động...</div>
    </div>

    <div class="version">v1.0.0</div>
  </div>

  <script>
    const bar = document.getElementById('progress-bar');
    const text = document.getElementById('progress-text');

    const stages = [
      { pct: 20, msg: 'Khởi động...', delay: 300 },
      { pct: 50, msg: 'Kết nối server...', delay: 600 },
      { pct: 75, msg: 'Tải cấu hình...', delay: 500 },
      { pct: 90, msg: 'Chuẩn bị giao diện...', delay: 400 },
      { pct: 100, msg: 'Sẵn sàng!', delay: 300 },
    ];

    async function runSplash() {
      for (const stage of stages) {
        await new Promise(r => setTimeout(r, stage.delay));
        bar.style.width = stage.pct + '%';
        text.textContent = stage.msg;
      }

      // Wait a moment for the user to see "Sẵn sàng!"
      await new Promise(r => setTimeout(r, 400));

      // Close splash and show main window
      if (window.__TAURI__) {
        try {
          const { getCurrentWindow } = window.__TAURI__.window;
          const { invoke } = window.__TAURI__.core;
          await invoke('close_splash');
        } catch (e) {
          console.error('Failed to close splash:', e);
          // Fallback: navigate to main
          window.location.href = '/';
        }
      } else {
        // Dev mode fallback
        window.location.href = '/';
      }
    }

    // Start after DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', runSplash);
    } else {
      runSplash();
    }
  </script>
</body>
</html>
