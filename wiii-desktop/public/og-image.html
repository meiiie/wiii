<!-- OG Image Template — screenshot at 1200x630 to create og-image.png -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px; height: 630px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: linear-gradient(135deg, #FAF5EE 0%, #FFF7ED 50%, #FFEDD5 100%);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
}
.container {
  text-align: center; z-index: 1;
}
.logo-wave {
  width: 120px; height: auto; margin-bottom: 24px;
}
h1 {
  font-size: 64px; font-weight: 800; color: #1E293B;
  letter-spacing: -2px; margin-bottom: 12px;
}
h1 span { color: #F97316; }
p.tagline {
  font-size: 28px; color: #64748B; font-weight: 400;
  max-width: 700px; margin: 0 auto 32px;
}
.features {
  display: flex; gap: 24px; justify-content: center;
}
.feature {
  background: white; border-radius: 16px; padding: 16px 24px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  font-size: 18px; color: #334155; font-weight: 500;
}
.feature .icon { font-size: 24px; margin-right: 8px; }
.brand {
  position: absolute; bottom: 24px; right: 32px;
  font-size: 16px; color: #94A3B8; font-weight: 500;
}
/* Decorative wave bg */
.wave-bg {
  position: absolute; bottom: -40px; left: 0; right: 0;
  height: 200px; opacity: 0.07;
}
</style>
</head>
<body>
  <svg class="wave-bg" viewBox="0 0 1200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0 100 C200 20,400 180,600 100 S1000 20,1200 100 V200 H0Z" fill="#F97316"/>
  </svg>
  <div class="container">
    <svg class="logo-wave" viewBox="0 0 512 300" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M32 180 C 60 80, 100 80, 130 150 S 180 230, 220 150 S 264 70, 300 150 S 340 230, 480 120"
        stroke="#F97316" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h1><span>Wiii</span> AI</h1>
    <p class="tagline">Trợ lý AI thông minh cho học tập và nghiên cứu</p>
    <div class="features">
      <div class="feature"><span class="icon">🎯</span>Trực quan hóa tương tác</div>
      <div class="feature"><span class="icon">🧠</span>Trí nhớ dài hạn</div>
      <div class="feature"><span class="icon">⚡</span>Đa tác tử thông minh</div>
    </div>
  </div>
  <div class="brand">by The Wiii Lab</div>
</body>
</html>
