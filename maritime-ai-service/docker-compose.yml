services:
  # =============================================================================
  # FASTAPI APP - Local Development with Hot Reload
  # =============================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wiii-app
    ports:
      - "8000:8000"
    volumes:
      # Mount source code for hot-reload
      - .:/app
      # Persist virtual environment
      - /app/.venv
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      # Database URLs pointing to Docker services (override .env for container networking)
      - DATABASE_URL=postgresql://${POSTGRES_USER:-wiii}:${POSTGRES_PASSWORD:-wiii_secret}@postgres:5432/${POSTGRES_DB:-wiii_ai}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-neo4j_secret}
      # MinIO (local S3 replacement)
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-wiii}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-wiii_secret}
      - MINIO_BUCKET=${MINIO_BUCKET:-wiii-docs}
      - SUPABASE_URL=http://minio:9000
      - SUPABASE_KEY=${SUPABASE_KEY:-minio-local-key}
    depends_on:
      postgres:
        condition: service_healthy
      # Neo4j: Legacy — opt-in with: docker compose --profile neo4j up
      # MinIO is optional — app starts without it, storage features degrade gracefully
      # To require MinIO, uncomment:
      # minio:
      #   condition: service_healthy
    # Override CMD for hot-reload
    command: ["sh", "-c", "pip install -e . 2>/dev/null || true && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app --log-level debug"]
    networks:
      - wiii-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

  # =============================================================================
  # POSTGRESQL - User Profiles & Application Data
  # =============================================================================
  postgres:
    image: pgvector/pgvector:pg15
    container_name: wiii-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wiii}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wiii_secret}
      POSTGRES_DB: ${POSTGRES_DB:-wiii_ai}
    ports:
      - "5433:5432"  # Map to 5433 to avoid conflicts with local Postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db:/docker-entrypoint-initdb.d:ro
    networks:
      - wiii-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiii -d wiii_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================================================
  # NEO4J - Knowledge Graph (Legacy — reserved for future Learning Graph)
  # Start with: docker compose --profile neo4j up
  # =============================================================================
  neo4j:
    image: neo4j:5-community
    container_name: wiii-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_secret}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    ports:
      - "7474:7474"  # Browser UI
      - "7687:7687"  # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - wiii-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    profiles:
      - neo4j  # Opt-in: docker compose --profile neo4j up

  # =============================================================================
  # MINIO - Local S3-Compatible Object Storage
  # Replaces Supabase Storage for local development
  # =============================================================================
  minio:
    image: minio/minio:latest
    container_name: wiii-minio
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-wiii}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-wiii_secret}
    volumes:
      - minio_data:/data
    networks:
      - wiii-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # =============================================================================
  # MINIO INIT - Create bucket on startup
  # =============================================================================
  minio-init:
    image: minio/mc:latest
    container_name: wiii-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-wiii}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-wiii_secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-wiii-docs}
    entrypoint: >
      /bin/sh -c "
      sleep 5 &&
      /usr/bin/mc config host add local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY &&
      /usr/bin/mc mb local/$$MINIO_BUCKET --ignore-existing &&
      /usr/bin/mc policy set public local/$$MINIO_BUCKET &&
      echo 'MinIO bucket created successfully'
      "
    networks:
      - wiii-network
    restart: "no"

  # =============================================================================
  # PGADMIN - Optional: PostgreSQL Admin UI
  # =============================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: wiii-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@wiii.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - wiii-network
    depends_on:
      - postgres
    profiles:
      - tools  # Only start with: docker-compose --profile tools up

  # =============================================================================
  # VALKEY - In-Memory Data Store (Redis-compatible, BSD licensed)
  # Sprint 18: Background tasks broker + cache
  # =============================================================================
  valkey:
    image: valkey/valkey:8-alpine
    container_name: wiii-valkey
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    volumes:
      - valkey_data:/data
    networks:
      - wiii-network
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    profiles:
      - tasks  # Only start with: docker-compose --profile tasks up

  # =============================================================================
  # NEO4J BROWSER - Already included in neo4j service (port 7474)
  # =============================================================================

volumes:
  postgres_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  minio_data:
    driver: local
  pgadmin_data:
    driver: local
  valkey_data:
    driver: local

networks:
  wiii-network:
    driver: bridge
    name: wiii-network
