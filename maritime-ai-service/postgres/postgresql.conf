# =============================================================================
# PostgreSQL 17 — Production Configuration for Wiii
# Tuned for: 4GB RAM server (e2-medium), pgvector workloads, 10K+ users
#
# Memory budget: ~1.2GB for PostgreSQL (shared with App, Nginx, Caddy, OS)
# =============================================================================

# ─────────────────────────────────────────────────
# Memory
# ─────────────────────────────────────────────────
shared_buffers = 384MB                  # 25% of PG allocation
effective_cache_size = 1GB              # OS cache + shared_buffers estimate
work_mem = 8MB                          # Per-operation (50 conn × 8MB = 400MB worst case)
maintenance_work_mem = 128MB            # VACUUM, CREATE INDEX, REINDEX
huge_pages = try                        # Slight TLB improvement if OS supports

# ─────────────────────────────────────────────────
# Connections
# ─────────────────────────────────────────────────
max_connections = 100                   # App pool max=50 + monitoring + admin headroom
superuser_reserved_connections = 3

# ─────────────────────────────────────────────────
# WAL & Checkpoints
# ─────────────────────────────────────────────────
wal_level = replica                     # Enables pg_basebackup streaming
max_wal_size = 1GB
min_wal_size = 256MB
checkpoint_completion_target = 0.9      # Spread checkpoint I/O
wal_compression = zstd                  # PG17: 30-40% smaller WAL

# ─────────────────────────────────────────────────
# Query Planner (SSD-optimized — GCP pd-ssd)
# ─────────────────────────────────────────────────
random_page_cost = 1.1                  # SSD (default 4.0 is for HDD)
effective_io_concurrency = 200          # SSD supports parallel I/O
default_statistics_target = 100

# ─────────────────────────────────────────────────
# Autovacuum (aggressive — pgvector tables have high churn)
# ─────────────────────────────────────────────────
autovacuum_max_workers = 3
autovacuum_naptime = 30s                # Check every 30s (default 60s)
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_scale_factor = 0.05   # Vacuum after 5% changes (default 20%)
autovacuum_analyze_scale_factor = 0.02  # Analyze after 2% changes

# ─────────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────────
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 500        # Log slow queries (>500ms)
log_checkpoints = on
log_connections = off                   # Too noisy with connection pooling
log_disconnections = off
log_lock_waits = on
log_temp_files = 0                      # Log all temp file usage
log_timezone = 'Asia/Ho_Chi_Minh'

# ─────────────────────────────────────────────────
# Security
# ─────────────────────────────────────────────────
password_encryption = scram-sha-256

# ─────────────────────────────────────────────────
# Locale (Vietnamese)
# ─────────────────────────────────────────────────
timezone = 'Asia/Ho_Chi_Minh'
lc_messages = 'en_US.UTF-8'
