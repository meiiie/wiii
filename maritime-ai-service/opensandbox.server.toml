# OpenSandbox local Docker config for Wiii development.
# This file is intended for the optional `sandbox` profile in docker-compose.yml.

[server]
host = "0.0.0.0"
port = 8080
log_level = "INFO"

[runtime]
type = "docker"
execd_image = "opensandbox/execd:v1.0.6"

[egress]
image = "opensandbox/egress:v1.0.1"

[storage]
allowed_host_paths = []

[docker]
network_mode = "bridge"
drop_capabilities = ["AUDIT_WRITE", "MKNOD", "NET_ADMIN", "NET_RAW", "SYS_ADMIN", "SYS_MODULE", "SYS_PTRACE", "SYS_TIME", "SYS_TTY_CONFIG"]
no_new_privileges = true
apparmor_profile = ""
pids_limit = 512
seccomp_profile = ""

[ingress]
mode = "direct"
