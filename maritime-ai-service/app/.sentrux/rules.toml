# Sentrux architectural quality rules for Wiii backend
# Baseline: 2026-03-27, quality_signal=3581/10000
# These thresholds prevent regression — any PR exceeding them fails CI

[quality]
# Overall quality signal (0-10000). Current: 3581
min_signal = 3500

[constraints]
# God files: files with too many responsibilities
# Current: 9 god files, largest = graph.py (8156 lines)
god_file_max_lines = 8200

# Complex functions exceeding cognitive threshold
# Current: 141
complex_fn_max = 145

# Dependency cycles (circular imports)
# Current: 8
cycle_max = 8

# Max import chain depth
# Current: 22
max_depth = 23
