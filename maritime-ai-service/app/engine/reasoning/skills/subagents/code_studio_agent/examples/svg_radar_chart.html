<!--
  STATE MODEL: datasets[]{label,values[]}, axes[]{label,max}, activeDatasets[], hoveredAxis, rotation
  RENDER SURFACE: Inline SVG — radar/spider polygon with axis spokes, grid rings, data fills
  CONTROLS: dataset toggles, rotation slider, grid density toggle
  READOUTS: hovered axis name, value per dataset, percentage
  FEEDBACK: WiiiVisualBridge.reportResult on axis hover and dataset toggle
-->
<style>
:root {
  --bg: #0f172a;
  --fg: #e2e8f0;
  --accent: #38bdf8;
  --accent-hover: #7dd3fc;
  --surface: #1e293b;
  --surface-alt: #334155;
  --border: #475569;
  --text-secondary: #94a3b8;
  --success: #4ade80;
  --warning: #fbbf24;
  --danger: #f87171;
  --radius: 8px;
  --font: system-ui, -apple-system, 'Segoe UI', sans-serif;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f8fafc; --fg: #0f172a; --accent: #0284c7;
    --accent-hover: #0369a1;
    --surface: #ffffff; --surface-alt: #f1f5f9;
    --border: #cbd5e1; --text-secondary: #64748b;
    --success: #16a34a; --warning: #d97706; --danger: #dc2626;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--fg); }
.radar-root {
  max-width: 700px;
  margin: 0 auto;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.radar-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  flex-wrap: wrap;
  gap: 12px;
}
.radar-title { font-size: 16px; font-weight: 500; }
.radar-subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.controls { display: flex; gap: 6px; flex-wrap: wrap; }
.toggle-btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text-secondary);
  font: 400 12px var(--font);
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.toggle-btn:hover { color: var(--fg); background: var(--surface-alt); }
.toggle-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.toggle-btn[aria-pressed="true"] {
  background: var(--accent); color: #0f172a;
  border-color: var(--accent); font-weight: 500;
}
.chart-container {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  overflow: hidden;
}
.chart-container svg { display: block; width: 100%; height: auto; }
.legend {
  display: flex; gap: 16px; font-size: 12px; color: var(--text-secondary);
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-swatch { width: 12px; height: 4px; border-radius: 2px; }
.detail-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  display: flex; flex-wrap: wrap; gap: 20px; align-items: center;
  min-height: 48px;
}
.detail-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.3px; }
.detail-value { font-size: 15px; font-weight: 500; color: var(--fg); }
.detail-value.accent { color: var(--accent); }
.detail-empty { font-size: 13px; color: var(--text-secondary); }
.detail-metric { display: flex; flex-direction: column; gap: 2px; }
@keyframes radar-fade { from { opacity: 0; } to { opacity: 1; } }
.radar-poly { animation: radar-fade 0.6s ease-out backwards; }
</style>

<div class="radar-root">
  <div class="radar-header">
    <div>
      <div class="radar-title">Danh gia nang luc tau bien</div>
      <div class="radar-subtitle">So sanh da chieu theo 6 tieu chi</div>
    </div>
    <div class="controls">
      <button class="toggle-btn" id="btn-a" aria-pressed="true" aria-label="Tau Container">Container</button>
      <button class="toggle-btn" id="btn-b" aria-pressed="true" aria-label="Tau Dau">Tau dau</button>
      <button class="toggle-btn" id="btn-c" aria-pressed="false" aria-label="Tau Du lich">Du lich</button>
    </div>
  </div>
  <div class="chart-container">
    <svg id="radar-svg" viewBox="0 0 500 440" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Bieu do radar so sanh nang luc tau bien"></svg>
  </div>
  <div class="legend" id="legend"></div>
  <div class="detail-bar" id="detail-bar" role="status" aria-live="polite">
    <span class="detail-empty" id="detail-empty">Di chuot len truc de xem chi tiet</span>
  </div>
</div>

<script>
(function () {
  var AXES = [
    { label: 'Toc do', max: 40, unit: 'knots' },
    { label: 'Tai trong', max: 200, unit: 'kDWT' },
    { label: 'An toan', max: 100, unit: '%' },
    { label: 'Tiet kiem NL', max: 100, unit: '%' },
    { label: 'Do ben', max: 50, unit: 'nam' },
    { label: 'Moi truong', max: 100, unit: '%' }
  ];
  var DATASETS = [
    { key: 'a', label: 'Container', color: 'var(--accent)', values: [24, 150, 85, 60, 30, 55] },
    { key: 'b', label: 'Tau dau', color: 'var(--warning)', values: [15, 180, 78, 45, 35, 40] },
    { key: 'c', label: 'Du lich', color: 'var(--success)', values: [22, 60, 92, 50, 25, 70] }
  ];

  var CX = 250, CY = 210, R = 160, N = AXES.length;
  var state = { active: { a: true, b: true, c: false }, hovered: -1 };
  var svg = document.getElementById('radar-svg');
  var detailBar = document.getElementById('detail-bar');
  var detailEmpty = document.getElementById('detail-empty');
  var legendEl = document.getElementById('legend');
  var NS = 'http://www.w3.org/2000/svg';

  function report(kind, payload, summary, status) {
    if (window.WiiiVisualBridge && window.WiiiVisualBridge.reportResult)
      window.WiiiVisualBridge.reportResult(kind, payload, summary, status);
  }

  function el(tag, attrs) {
    var node = document.createElementNS(NS, tag);
    if (attrs) Object.keys(attrs).forEach(function (k) { node.setAttribute(k, attrs[k]); });
    return node;
  }

  function angleFor(i) { return (Math.PI * 2 * i / N) - Math.PI / 2; }

  function pointAt(i, frac) {
    var a = angleFor(i);
    return { x: CX + R * frac * Math.cos(a), y: CY + R * frac * Math.sin(a) };
  }

  function polyPoints(values) {
    return values.map(function (v, i) {
      var p = pointAt(i, v / AXES[i].max);
      return p.x.toFixed(1) + ',' + p.y.toFixed(1);
    }).join(' ');
  }

  function render() {
    svg.innerHTML = '';
    var rings = [0.25, 0.5, 0.75, 1.0];
    rings.forEach(function (frac) {
      var pts = [];
      for (var i = 0; i < N; i++) { var p = pointAt(i, frac); pts.push(p.x.toFixed(1) + ',' + p.y.toFixed(1)); }
      svg.appendChild(el('polygon', {
        points: pts.join(' '), fill: 'none',
        stroke: 'var(--border)', 'stroke-width': '0.6', opacity: '0.5'
      }));
    });

    for (var i = 0; i < N; i++) {
      var p = pointAt(i, 1);
      svg.appendChild(el('line', {
        x1: CX, y1: CY, x2: p.x, y2: p.y,
        stroke: 'var(--border)', 'stroke-width': '0.6', opacity: '0.5'
      }));
      var lp = pointAt(i, 1.18);
      var txt = el('text', {
        x: lp.x, y: lp.y, 'text-anchor': 'middle', 'dominant-baseline': 'central',
        fill: state.hovered === i ? 'var(--fg)' : 'var(--text-secondary)',
        'font-size': state.hovered === i ? '13' : '11',
        'font-weight': state.hovered === i ? '600' : '400',
        'font-family': 'var(--font)'
      });
      txt.textContent = AXES[i].label;
      svg.appendChild(txt);

      var hitP = pointAt(i, 1.25);
      var hit = el('circle', {
        cx: hitP.x, cy: hitP.y, r: '28', fill: 'transparent', 'pointer-events': 'all',
        cursor: 'pointer', 'data-idx': i
      });
      (function (idx) {
        hit.addEventListener('mouseenter', function () { setHover(idx); });
        hit.addEventListener('mouseleave', function () { setHover(-1); });
      })(i);
      svg.appendChild(hit);
    }

    DATASETS.forEach(function (ds, di) {
      if (!state.active[ds.key]) return;
      svg.appendChild(el('polygon', {
        points: polyPoints(ds.values),
        fill: ds.color, 'fill-opacity': '0.12',
        stroke: ds.color, 'stroke-width': '2',
        class: 'radar-poly',
        style: 'animation-delay: ' + (di * 0.15) + 's'
      }));
      ds.values.forEach(function (v, i) {
        var p = pointAt(i, v / AXES[i].max);
        svg.appendChild(el('circle', {
          cx: p.x, cy: p.y, r: state.hovered === i ? '5' : '3.5',
          fill: ds.color, stroke: 'var(--surface)', 'stroke-width': '1.5'
        }));
      });
    });
  }

  function setHover(idx) {
    state.hovered = idx;
    render();
    if (idx >= 0) showDetail(idx);
    else resetDetail();
  }

  function showDetail(idx) {
    detailEmpty.style.display = 'none';
    var existing = detailBar.querySelectorAll('.detail-metric');
    existing.forEach(function (el) { el.remove(); });
    var add = function (label, value, cls) {
      var m = document.createElement('div'); m.className = 'detail-metric';
      var l = document.createElement('span'); l.className = 'detail-label'; l.textContent = label;
      var v = document.createElement('span'); v.className = 'detail-value' + (cls ? ' ' + cls : ''); v.textContent = value;
      m.appendChild(l); m.appendChild(v); detailBar.appendChild(m);
    };
    add('Tieu chi', AXES[idx].label, '');
    DATASETS.forEach(function (ds) {
      if (!state.active[ds.key]) return;
      var pct = Math.round(ds.values[idx] / AXES[idx].max * 100);
      add(ds.label, ds.values[idx] + ' ' + AXES[idx].unit + ' (' + pct + '%)', 'accent');
    });
    report('axis_hover', { axis: AXES[idx].label, index: idx }, AXES[idx].label, 'info');
  }

  function resetDetail() {
    detailEmpty.style.display = '';
    var existing = detailBar.querySelectorAll('.detail-metric');
    existing.forEach(function (el) { el.remove(); });
  }

  function buildLegend() {
    legendEl.innerHTML = '';
    DATASETS.forEach(function (ds) {
      if (!state.active[ds.key]) return;
      var item = document.createElement('div'); item.className = 'legend-item';
      var swatch = document.createElement('span'); swatch.className = 'legend-swatch';
      swatch.style.background = ds.color;
      var lbl = document.createElement('span'); lbl.textContent = ds.label;
      item.appendChild(swatch); item.appendChild(lbl); legendEl.appendChild(item);
    });
  }

  function toggleDataset(key) {
    state.active[key] = !state.active[key];
    document.getElementById('btn-' + key).setAttribute('aria-pressed', state.active[key]);
    render(); buildLegend();
    report('dataset_toggle', { key: key, active: state.active[key] },
      key + ': ' + (state.active[key] ? 'hien' : 'an'), 'info');
  }

  document.getElementById('btn-a').addEventListener('click', function () { toggleDataset('a'); });
  document.getElementById('btn-b').addEventListener('click', function () { toggleDataset('b'); });
  document.getElementById('btn-c').addEventListener('click', function () { toggleDataset('c'); });

  render(); buildLegend();
})();
</script>
