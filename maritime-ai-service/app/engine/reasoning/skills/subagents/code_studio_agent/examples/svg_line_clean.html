<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; background: transparent; color: #2a2520; }

  /* ═══ Root ═══ */
  .lc {
    --cam: #D97757; --cam-20: rgba(217,119,87,0.20); --cam-05: rgba(217,119,87,0.05);
    --mint: #85CDCA; --mint-20: rgba(133,205,202,0.20);
    --vang: #FFD166;
    --red: #c44; --red-bg: #fef2f0;
    --green: #16864a; --green-bg: #eefbf2;
    --grid: #ece8e3; --grid-light: #f5f2ee;
    --text2: #777; --text3: #aaa;
    max-width: 620px; padding: 20px 0;
    position: relative;
  }

  /* ═══ Header ═══ */
  .lc__head { margin-bottom: 20px; }
  .lc__title {
    font-size: 16px; font-weight: 700; color: #1a1714;
    letter-spacing: -0.01em; line-height: 1.3;
  }
  .lc__sub {
    font-size: 13px; color: var(--text2); margin-top: 3px;
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .lc__sub-dot {
    width: 3px; height: 3px; border-radius: 50%;
    background: var(--text3); flex-shrink: 0;
  }

  /* ═══ Chart wrapper ═══ */
  .lc__chart { position: relative; cursor: crosshair; }
  .lc__chart svg { display: block; overflow: visible; }

  /* ═══ SVG animations ═══ */

  /* Line draw animation */
  .lc-path-anim {
    stroke-dasharray: 1200;
    stroke-dashoffset: 1200;
    animation: lineDraw 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
  }
  @keyframes lineDraw {
    to { stroke-dashoffset: 0; }
  }

  /* Area fade in */
  .lc-area-anim {
    opacity: 0;
    animation: areaFade 0.6s ease 0.7s forwards;
  }
  @keyframes areaFade {
    to { opacity: 1; }
  }

  /* Dot pop in */
  .lc-dot {
    transform-origin: center;
    opacity: 0;
    animation: dotPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  .lc-dot-d0 { animation-delay: 0.30s; }
  .lc-dot-d1 { animation-delay: 0.50s; }
  .lc-dot-d2 { animation-delay: 0.70s; }
  .lc-dot-d3 { animation-delay: 0.90s; }
  .lc-dot-d4 { animation-delay: 1.10s; }
  .lc-dot-d5 { animation-delay: 1.30s; }
  @keyframes dotPop {
    0%   { opacity: 0; transform: scale(0); }
    70%  { opacity: 1; transform: scale(1.3); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* Value label fade */
  .lc-val {
    opacity: 0;
    animation: valUp 0.3s ease forwards;
  }
  .lc-val-d0 { animation-delay: 0.40s; }
  .lc-val-d1 { animation-delay: 0.60s; }
  .lc-val-d2 { animation-delay: 0.80s; }
  .lc-val-d3 { animation-delay: 1.00s; }
  .lc-val-d4 { animation-delay: 1.20s; }
  .lc-val-d5 { animation-delay: 1.40s; }
  @keyframes valUp {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Annotation pulse for special points */
  .lc-pulse {
    animation: pulse 2s ease-in-out infinite;
    transform-origin: center;
  }
  @keyframes pulse {
    0%, 100% { r: 14; opacity: 0.12; }
    50%      { r: 20; opacity: 0.04; }
  }

  /* ═══ Hover dots (larger hit area) ═══ */
  .lc-hit { cursor: pointer; }
  .lc-hit:hover .lc-dot-inner {
    r: 5.5;
    filter: brightness(1.1);
  }
  .lc-dot-inner {
    transition: r 0.15s ease, filter 0.15s ease;
  }

  /* ═══ Crosshair ═══ */
  .lc__cross {
    position: absolute; top: 0; pointer-events: none;
    width: 1px; background: rgba(0,0,0,0.08);
    display: none; z-index: 2;
  }

  /* ═══ Tooltip ═══ */
  .lc__tip {
    position: absolute;
    background: #1a1714; color: #ede8e3;
    font-size: 11.5px; font-weight: 500;
    padding: 8px 14px; border-radius: 8px;
    white-space: nowrap; line-height: 1.5;
    pointer-events: none;
    opacity: 0;
    transform: translateX(-50%) translateY(4px);
    transition: opacity 0.15s ease, transform 0.15s ease, left 0.08s ease, top 0.08s ease;
    z-index: 10;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    max-width: 220px;
  }
  .lc__tip::after {
    content: '';
    position: absolute; top: 100%; left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: #1a1714;
  }
  .lc__tip.active {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .lc__tip-year {
    font-size: 10px; color: #9a9590; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.05em;
    margin-bottom: 2px;
  }
  .lc__tip-val {
    font-size: 14px; font-weight: 700; color: #fff;
  }
  .lc__tip-note {
    font-size: 10.5px; color: #b5afa8; margin-top: 3px;
    white-space: normal;
  }

  /* ═══ Legend ═══ */
  .lc__legend {
    display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap;
  }
  .lc__legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 11.5px; color: #666;
  }
  .lc__legend-line {
    width: 16px; height: 2.5px; border-radius: 2px;
  }
  .lc__legend-dash {
    width: 16px; height: 0; border-top: 1.5px dashed #b0a89f;
  }

  /* ═══ Footer ═══ */
  .lc__foot {
    margin-top: 18px; padding-top: 14px;
    border-top: 1px solid #f0ece7;
    display: flex; justify-content: space-between;
    align-items: flex-end; gap: 16px; flex-wrap: wrap;
  }
  .lc__source {
    font-size: 11px; color: var(--text3); line-height: 1.6;
  }
  .lc__source em { font-style: italic; }
  .lc__source-warn {
    display: inline-flex; align-items: center; gap: 3px;
    color: #c49a40; font-weight: 500; font-style: normal;
  }
  .lc__trend {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 600;
    padding: 4px 12px; border-radius: 20px;
    white-space: nowrap; flex-shrink: 0;
  }
  .lc__trend--up   { color: #16864a; background: #eefbf2; }
  .lc__trend--down { color: #c44; background: #fef2f0; }
</style>

<script>
  (function () {
    var wrap  = document.getElementById('chartWrap');
    var tip   = document.getElementById('tip');
    var tipY  = document.getElementById('tipYear');
    var tipV  = document.getElementById('tipVal');
    var tipN  = document.getElementById('tipNote');
    var cross = document.getElementById('cross');
    var hits  = document.querySelectorAll('.lc-hit');

    if (!wrap || !tip) return;

    /* ── Tooltip on data points ── */
    hits.forEach(function (g) {
      g.addEventListener('mouseenter', function () {
        var year = g.getAttribute('data-year');
        var val  = g.getAttribute('data-val');
        var note = g.getAttribute('data-note');

        tipY.textContent = year;
        tipV.textContent = val + ' lượt';
        tipN.textContent = note || '';
        tipN.style.display = note ? 'block' : 'none';
        tip.classList.add('active');

        // Position
        var dot  = g.querySelector('circle:nth-child(2)') || g.querySelector('.lc-dot-inner') || g.querySelector('circle');
        if (!dot) return;
        var rect = dot.getBoundingClientRect();
        var wRect = wrap.getBoundingClientRect();
        tip.style.left = (rect.left + rect.width / 2 - wRect.left) + 'px';
        tip.style.top  = (rect.top - wRect.top - 14) + 'px';

        // Crosshair
        if (cross) {
          var svgRect = document.getElementById('chartSvg').getBoundingClientRect();
          cross.style.display = 'block';
          cross.style.left = (rect.left + rect.width / 2 - wRect.left) + 'px';
          cross.style.top = '0';
          cross.style.height = (svgRect.height) + 'px';
        }
      });

      g.addEventListener('mouseleave', function () {
        tip.classList.remove('active');
        if (cross) cross.style.display = 'none';
      });
    });

    /* ── Crosshair follows mouse across chart (subtle) ── */
    var svg = document.getElementById('chartSvg');
    if (svg && cross) {
      svg.addEventListener('mousemove', function (e) {
        var wRect = wrap.getBoundingClientRect();
        var x = e.clientX - wRect.left;
        // Only show between data area
        if (x > 60 && x < wRect.width - 20) {
          cross.style.display = 'block';
          cross.style.left = x + 'px';
          cross.style.top = '0';
          cross.style.height = svg.getBoundingClientRect().height + 'px';
        }
      });
      svg.addEventListener('mouseleave', function () {
        // Don't hide if hovering a dot (handled by dot events)
        setTimeout(function () {
          if (!tip.classList.contains('active')) {
            cross.style.display = 'none';
          }
        }, 50);
      });
    }
  })();

  if (typeof WiiiVisualBridge !== 'undefined') {
    WiiiVisualBridge.reportResult({ type: 'line_area', points: 7, version: 'v2-pro' });
  }
</script>
