<!--
  STATE MODEL: ships[]{name,cruise,max}, activeDataset('cruise'|'both'), hoveredIndex, sortOrder
  RENDER SURFACE: Inline SVG — horizontal bars with axis, labels, value annotations
  CONTROLS: dataset toggle (cruise / max / both), sort toggle (value / alphabetical)
  READOUTS: highlighted ship name, speed value, speed unit
  FEEDBACK: WiiiVisualBridge.reportResult on bar click and dataset toggle
-->
<style>
:root {
  --bg: #0f172a;
  --fg: #e2e8f0;
  --accent: #38bdf8;
  --accent-hover: #7dd3fc;
  --surface: #1e293b;
  --surface-alt: #334155;
  --border: #475569;
  --text-secondary: #94a3b8;
  --success: #4ade80;
  --warning: #fbbf24;
  --danger: #f87171;
  --radius: 8px;
  --font: system-ui, -apple-system, 'Segoe UI', sans-serif;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f8fafc; --fg: #0f172a; --accent: #0284c7;
    --accent-hover: #0369a1;
    --surface: #ffffff; --surface-alt: #f1f5f9;
    --border: #cbd5e1; --text-secondary: #64748b;
    --success: #16a34a; --warning: #d97706; --danger: #dc2626;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--fg); }
.chart-root {
  max-width: 780px;
  margin: 0 auto;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.chart-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  flex-wrap: wrap;
  gap: 12px;
}
.chart-title {
  font-size: 16px;
  font-weight: 500;
  color: var(--fg);
}
.chart-subtitle {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 2px;
}
.controls {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.toggle-btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text-secondary);
  font: 400 12px var(--font);
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.toggle-btn:hover { color: var(--fg); background: var(--surface-alt); }
.toggle-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.toggle-btn[aria-pressed="true"] {
  background: var(--accent);
  color: #0f172a;
  border-color: var(--accent);
  font-weight: 500;
}
.chart-container {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 16px 16px;
  overflow: hidden;
}
.chart-container svg { display: block; width: 100%; height: auto; }
.chart-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}
.legend {
  display: flex;
  gap: 16px;
  font-size: 12px;
  color: var(--text-secondary);
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-swatch { width: 12px; height: 4px; border-radius: 2px; }
.chart-source {
  font-size: 11px;
  color: var(--text-secondary);
  font-style: italic;
}
.detail-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  align-items: center;
  min-height: 48px;
}
.detail-metric { display: flex; flex-direction: column; gap: 2px; }
.detail-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.3px; }
.detail-value { font-size: 15px; font-weight: 500; color: var(--fg); }
.detail-value.accent { color: var(--accent); }
.detail-empty { font-size: 13px; color: var(--text-secondary); }
.bar-group { cursor: pointer; }
.bar-group:focus { outline: none; }
.bar-group:focus-visible rect.bar-cruise,
.bar-group:focus-visible rect.bar-max { stroke: var(--fg); stroke-width: 2; }
@keyframes bar-enter {
  from { transform: scaleX(0); }
  to { transform: scaleX(1); }
}
.bar-cruise, .bar-max {
  animation: bar-enter 0.5s cubic-bezier(0.23, 1, 0.32, 1) backwards;
}
@media (max-width: 520px) {
  .chart-header { flex-direction: column; }
  .detail-bar { gap: 12px; }
}
</style>

<div class="chart-root">
  <div class="chart-header">
    <div>
      <div class="chart-title">So sanh toc do cac loai tau bien</div>
      <div class="chart-subtitle">Toc do hanh trinh va toc do toi da (knots)</div>
    </div>
    <div class="controls">
      <button class="toggle-btn" id="btn-cruise" aria-pressed="true" aria-label="Hien thi toc do hanh trinh">Hanh trinh</button>
      <button class="toggle-btn" id="btn-max" aria-pressed="false" aria-label="Hien thi toc do toi da">Toi da</button>
      <button class="toggle-btn" id="btn-both" aria-pressed="false" aria-label="Hien thi ca hai">Ca hai</button>
      <button class="toggle-btn" id="btn-sort" aria-pressed="false" aria-label="Sap xep theo gia tri">Sap xep</button>
    </div>
  </div>

  <div class="chart-container">
    <svg id="chart-svg" viewBox="0 0 700 340" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Bieu do ngang so sanh toc do tau bien"></svg>
  </div>

  <div class="chart-footer">
    <div class="legend" id="legend">
      <div class="legend-item">
        <span class="legend-swatch" style="background: var(--accent)"></span>
        Toc do hanh trinh
      </div>
      <div class="legend-item" id="legend-max" style="display:none">
        <span class="legend-swatch" style="background: var(--warning)"></span>
        Toc do toi da
      </div>
    </div>
    <div class="chart-source">Don vi: knots (1 knot = 1.852 km/h)</div>
  </div>

  <div class="detail-bar" id="detail-bar" role="status" aria-live="polite">
    <span class="detail-empty" id="detail-empty">Nhan vao cot de xem chi tiet</span>
  </div>
</div>

<script>
(function () {
  var SHIPS = [
    { name: 'Ferry',           nameVi: 'Pha cao toc',     cruise: 30, max: 40 },
    { name: 'Container ship',  nameVi: 'Tau container',   cruise: 24, max: 30 },
    { name: 'Cruise ship',     nameVi: 'Tau du lich',     cruise: 22, max: 28 },
    { name: 'Tanker',          nameVi: 'Tau dau',         cruise: 15, max: 18 },
    { name: 'Bulk carrier',    nameVi: 'Tau hang roi',    cruise: 14, max: 16 },
    { name: 'Tug boat',        nameVi: 'Tau keo',         cruise: 12, max: 15 }
  ];

  var COLORS = {
    cruise: 'var(--accent)',
    max: 'var(--warning)'
  };

  var state = {
    dataset: 'cruise',
    sorted: false,
    hoveredIndex: -1
  };

  var svg = document.getElementById('chart-svg');
  var detailBar = document.getElementById('detail-bar');
  var detailEmpty = document.getElementById('detail-empty');
  var legendMax = document.getElementById('legend-max');
  var btnCruise = document.getElementById('btn-cruise');
  var btnMax = document.getElementById('btn-max');
  var btnBoth = document.getElementById('btn-both');
  var btnSort = document.getElementById('btn-sort');

  var NS = 'http://www.w3.org/2000/svg';

  function report(kind, payload, summary, status) {
    if (window.WiiiVisualBridge && window.WiiiVisualBridge.reportResult) {
      window.WiiiVisualBridge.reportResult(kind, payload, summary, status);
    }
  }

  function getOrderedShips() {
    var list = SHIPS.slice();
    if (state.sorted) {
      var key = state.dataset === 'max' ? 'max' : 'cruise';
      list.sort(function (a, b) { return b[key] - a[key]; });
    }
    return list;
  }

  function el(tag, attrs) {
    var node = document.createElementNS(NS, tag);
    if (attrs) {
      Object.keys(attrs).forEach(function (k) { node.setAttribute(k, attrs[k]); });
    }
    return node;
  }

  function render() {
    svg.innerHTML = '';
    var ships = getOrderedShips();
    var showBoth = state.dataset === 'both';
    var showMax = state.dataset === 'max' || showBoth;
    var showCruise = state.dataset === 'cruise' || showBoth;

    var maxVal = 0;
    ships.forEach(function (s) {
      if (showCruise && s.cruise > maxVal) maxVal = s.cruise;
      if (showMax && s.max > maxVal) maxVal = s.max;
    });
    maxVal = Math.ceil(maxVal / 5) * 5 + 5;

    var left = 130;
    var right = 660;
    var top = 24;
    var barH = showBoth ? 18 : 28;
    var gap = showBoth ? 48 : 42;
    var chartW = right - left;

    var totalH = top + ships.length * gap + 24;
    svg.setAttribute('viewBox', '0 0 700 ' + totalH);

    var gridSteps = [0, 10, 20, 30, 40];
    if (maxVal > 40) gridSteps.push(50);

    gridSteps.forEach(function (v) {
      var x = left + (v / maxVal) * chartW;
      svg.appendChild(el('line', {
        x1: x, y1: top - 4, x2: x, y2: top + ships.length * gap,
        stroke: 'var(--border)', 'stroke-width': '0.5', opacity: '0.5'
      }));
      svg.appendChild(el('text', {
        x: x, y: top - 10, 'text-anchor': 'middle',
        fill: 'var(--text-secondary)', 'font-size': '10',
        'font-weight': '400', 'font-family': 'var(--font)'
      })).textContent = v;
    });

    var axisLabel = el('text', {
      x: left + chartW / 2, y: top - 22, 'text-anchor': 'middle',
      fill: 'var(--text-secondary)', 'font-size': '10',
      'font-weight': '400', 'font-family': 'var(--font)'
    });
    axisLabel.textContent = 'Toc do (knots)';
    svg.appendChild(axisLabel);

    ships.forEach(function (ship, i) {
      var y = top + i * gap + gap * 0.5;
      var g = el('g', {
        class: 'bar-group', tabindex: '0',
        'aria-label': ship.nameVi + ': ' + ship.cruise + ' knots hanh trinh, ' + ship.max + ' knots toi da',
        role: 'button'
      });

      var nameLabel = el('text', {
        x: left - 8, y: y + (showBoth ? 4 : 5), 'text-anchor': 'end',
        fill: 'var(--fg)', 'font-size': '13', 'font-weight': '400',
        'font-family': 'var(--font)'
      });
      nameLabel.textContent = ship.nameVi;
      g.appendChild(nameLabel);

      var engLabel = el('text', {
        x: left - 8, y: y + (showBoth ? 18 : 19), 'text-anchor': 'end',
        fill: 'var(--text-secondary)', 'font-size': '10', 'font-weight': '400',
        'font-family': 'var(--font)'
      });
      engLabel.textContent = ship.name;
      g.appendChild(engLabel);

      if (showBoth) {
        var maxW = (ship.max / maxVal) * chartW;
        var maxBar = el('rect', {
          x: left, y: y - barH + 2, width: maxW, height: barH,
          rx: '3', fill: COLORS.max, opacity: '0.45',
          class: 'bar-max',
          style: 'transform-origin: ' + left + 'px 0; animation-delay: ' + (i * 0.06 + 0.05) + 's'
        });
        g.appendChild(maxBar);

        var maxValLabel = el('text', {
          x: left + maxW + 6, y: y - barH + 2 + barH * 0.7,
          fill: 'var(--warning)', 'font-size': '11', 'font-weight': '500',
          'font-family': 'var(--font)', opacity: '0.8'
        });
        maxValLabel.textContent = ship.max;
        g.appendChild(maxValLabel);
      }

      if (showCruise) {
        var cruiseW = (ship.cruise / maxVal) * chartW;
        var cruiseY = showBoth ? y + 4 : y - barH * 0.5;
        var cruiseBar = el('rect', {
          x: left, y: cruiseY, width: cruiseW, height: barH,
          rx: '3', fill: COLORS.cruise, opacity: '0.85',
          class: 'bar-cruise',
          style: 'transform-origin: ' + left + 'px 0; animation-delay: ' + (i * 0.06) + 's'
        });
        g.appendChild(cruiseBar);

        var cruiseValLabel = el('text', {
          x: left + cruiseW + 6, y: cruiseY + barH * 0.7,
          fill: 'var(--accent)', 'font-size': '11', 'font-weight': '500',
          'font-family': 'var(--font)'
        });
        cruiseValLabel.textContent = ship.cruise;
        g.appendChild(cruiseValLabel);
      }

      if (showMax && !showBoth) {
        var maxOnlyW = (ship.max / maxVal) * chartW;
        var maxOnlyBar = el('rect', {
          x: left, y: y - barH * 0.5, width: maxOnlyW, height: barH,
          rx: '3', fill: COLORS.max, opacity: '0.75',
          class: 'bar-max',
          style: 'transform-origin: ' + left + 'px 0; animation-delay: ' + (i * 0.06) + 's'
        });
        g.appendChild(maxOnlyBar);

        var maxOnlyValLabel = el('text', {
          x: left + maxOnlyW + 6, y: y + 5,
          fill: 'var(--warning)', 'font-size': '11', 'font-weight': '500',
          'font-family': 'var(--font)'
        });
        maxOnlyValLabel.textContent = ship.max;
        g.appendChild(maxOnlyValLabel);
      }

      var hitArea = el('rect', {
        x: 0, y: y - gap * 0.45, width: '700', height: gap * 0.9,
        fill: 'transparent', 'pointer-events': 'all'
      });
      g.insertBefore(hitArea, g.firstChild);

      (function (idx, s) {
        g.addEventListener('mouseenter', function () { highlightBar(idx); });
        g.addEventListener('mouseleave', function () { clearHighlight(); });
        g.addEventListener('focus', function () { highlightBar(idx); });
        g.addEventListener('blur', function () { clearHighlight(); });
        g.addEventListener('click', function () {
          showDetail(s);
          report('bar_clicked', {
            ship: s.name, cruise: s.cruise, max: s.max
          }, s.nameVi + ': ' + s.cruise + '/' + s.max + ' knots', 'info');
        });
        g.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            showDetail(s);
            report('bar_clicked', {
              ship: s.name, cruise: s.cruise, max: s.max
            }, s.nameVi + ': ' + s.cruise + '/' + s.max + ' knots', 'info');
          }
        });
      })(i, ship);

      svg.appendChild(g);
    });

    svg.appendChild(el('line', {
      x1: left, y1: top - 4, x2: left, y2: top + ships.length * gap,
      stroke: 'var(--border)', 'stroke-width': '1'
    }));

    legendMax.style.display = (showMax || showBoth) ? '' : 'none';
  }

  function highlightBar(idx) {
    var groups = svg.querySelectorAll('.bar-group');
    groups.forEach(function (g, j) {
      if (j !== idx) g.setAttribute('opacity', '0.35');
    });
  }

  function clearHighlight() {
    svg.querySelectorAll('.bar-group').forEach(function (g) {
      g.removeAttribute('opacity');
    });
  }

  function showDetail(ship) {
    detailEmpty.style.display = 'none';
    var existing = detailBar.querySelectorAll('.detail-metric');
    existing.forEach(function (el) { el.remove(); });

    var fields = [
      { label: 'Loai tau', value: ship.nameVi, cls: '' },
      { label: 'Ten tieng Anh', value: ship.name, cls: '' },
      { label: 'Toc do hanh trinh', value: ship.cruise + ' knots', cls: 'accent' },
      { label: 'Toc do toi da', value: ship.max + ' knots', cls: '' },
      { label: 'Chenh lech', value: (ship.max - ship.cruise) + ' knots', cls: '' }
    ];

    fields.forEach(function (f) {
      var m = document.createElement('div');
      m.className = 'detail-metric';
      var lbl = document.createElement('span');
      lbl.className = 'detail-label';
      lbl.textContent = f.label;
      var val = document.createElement('span');
      val.className = 'detail-value' + (f.cls ? ' ' + f.cls : '');
      val.textContent = f.value;
      m.appendChild(lbl);
      m.appendChild(val);
      detailBar.appendChild(m);
    });
  }

  function setDataset(ds) {
    state.dataset = ds;
    btnCruise.setAttribute('aria-pressed', ds === 'cruise');
    btnMax.setAttribute('aria-pressed', ds === 'max');
    btnBoth.setAttribute('aria-pressed', ds === 'both');
    render();
    report('dataset_changed', { dataset: ds }, 'Hien thi: ' + ds, 'info');
  }

  btnCruise.addEventListener('click', function () { setDataset('cruise'); });
  btnMax.addEventListener('click', function () { setDataset('max'); });
  btnBoth.addEventListener('click', function () { setDataset('both'); });

  btnSort.addEventListener('click', function () {
    state.sorted = !state.sorted;
    btnSort.setAttribute('aria-pressed', state.sorted);
    render();
    report('sort_toggled', { sorted: state.sorted },
      state.sorted ? 'Sap xep theo gia tri' : 'Thu tu mac dinh', 'info');
  });

  render();
})();
</script>
