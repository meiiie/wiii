name: Build Production Images

on:
  push:
    branches: [main]
    paths:
      - 'wiii-desktop/**'
      - 'maritime-ai-service/**'
      - '.github/workflows/build-production-images.yml'
      - '.dockerignore'
  pull_request:
    branches: [main]
    paths:
      - 'wiii-desktop/**'
      - 'maritime-ai-service/**'
      - '.github/workflows/build-production-images.yml'
      - '.dockerignore'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: wiii-desktop/package-lock.json

      - name: Build web + embed bundles
        working-directory: wiii-desktop
        run: |
          npm ci
          npm run build:web
          npm run build:embed

      - name: Set lowercase owner
        id: owner
        shell: bash
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Publish both the new wiii-* tags and the legacy lms-ai-* tags for one
      # release window so running deployments that still pull the old name keep
      # working. After the first production deploy on wiii-app / wiii-nginx, the
      # legacy tag block can be removed.
      - name: Build and push app image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: maritime-ai-service/Dockerfile.prod
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/wiii-app:main
            ghcr.io/${{ steps.owner.outputs.value }}/wiii-app:sha-${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.value }}/lms-ai-app:main
            ghcr.io/${{ steps.owner.outputs.value }}/lms-ai-app:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push nginx image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: maritime-ai-service/nginx/Dockerfile.prod
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/wiii-nginx:main
            ghcr.io/${{ steps.owner.outputs.value }}/wiii-nginx:sha-${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.value }}/lms-ai-nginx:main
            ghcr.io/${{ steps.owner.outputs.value }}/lms-ai-nginx:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
