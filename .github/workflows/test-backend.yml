name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - 'maritime-ai-service/**'
      - '.github/workflows/test-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'maritime-ai-service/**'
      - '.github/workflows/test-backend.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: wiii
          POSTGRES_PASSWORD: wiii_secret
          POSTGRES_DB: wiii_ai
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U wiii"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://wiii:wiii_secret@localhost:5433/wiii_ai
      API_KEY: test-key
      GOOGLE_API_KEY: fake-key-for-unit-tests
      ENVIRONMENT: test
      PYTHONIOENCODING: utf-8

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: maritime-ai-service/requirements.txt

      - name: Install dependencies
        working-directory: maritime-ai-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        working-directory: maritime-ai-service
        run: |
          pytest tests/unit/ -p no:capture --tb=short -q --co -q 2>/dev/null | tail -1
          pytest tests/unit/ -p no:capture --tb=short -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: maritime-ai-service/htmlcov/
          retention-days: 7
