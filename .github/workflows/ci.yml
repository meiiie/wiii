name: CI

on:
  push:
    branches: [main]
    paths:
      - 'maritime-ai-service/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'maritime-ai-service/**'
      - '.github/workflows/ci.yml'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        working-directory: maritime-ai-service
        run: ruff check app/

  test:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: wiii
          POSTGRES_PASSWORD: wiii_secret
          POSTGRES_DB: wiii_ai
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U wiii"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://wiii:wiii_secret@localhost:5433/wiii_ai
      API_KEY: test-key
      GOOGLE_API_KEY: fake-key-for-unit-tests
      ENVIRONMENT: test
      PYTHONIOENCODING: utf-8

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: maritime-ai-service/requirements.txt

      - name: Install dependencies
        working-directory: maritime-ai-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        working-directory: maritime-ai-service
        run: pytest tests/unit/ -x -p no:capture --tb=short -q

  security-audit:
    name: Security Audit (pip-audit)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies and pip-audit
        working-directory: maritime-ai-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Run pip-audit
        working-directory: maritime-ai-service
        run: pip-audit --strict --desc on 2>&1 | tee pip-audit-results.txt

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: maritime-ai-service/pip-audit-results.txt
          retention-days: 30

  docker-build:
    name: Docker Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: maritime-ai-service
        run: docker build -t wiii-service:ci-${{ github.sha }} .
