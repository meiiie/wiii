name: Desktop Tests

on:
  push:
    branches: [main]
    paths:
      - 'wiii-desktop/**'
      - '.github/workflows/test-desktop.yml'
  pull_request:
    branches: [main]
    paths:
      - 'wiii-desktop/**'
      - '.github/workflows/test-desktop.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: wiii-desktop/package-lock.json

      - name: Install dependencies
        working-directory: wiii-desktop
        run: npm ci

      - name: Run tests with coverage
        working-directory: wiii-desktop
        run: npx vitest run --coverage

      - name: Type check
        working-directory: wiii-desktop
        run: npx tsc --noEmit

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: desktop-coverage
          path: wiii-desktop/coverage/
          retention-days: 7

  build-embed:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: wiii-desktop/package-lock.json

      - name: Install dependencies
        working-directory: wiii-desktop
        run: npm ci

      - name: Build embed bundle
        working-directory: wiii-desktop
        run: npm run build:embed

      - name: Validate embed output
        shell: bash
        run: |
          test -f wiii-desktop/dist-embed/embed.html
          test -f wiii-desktop/dist-embed/index.html

      - name: Upload embed artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-embed-dist
          path: wiii-desktop/dist-embed/
          retention-days: 7
