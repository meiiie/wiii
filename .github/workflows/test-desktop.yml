name: Desktop Tests

on:
  push:
    branches: [main]
    paths:
      - 'wiii-desktop/**'
      - '.github/workflows/test-desktop.yml'
  pull_request:
    branches: [main]
    paths:
      - 'wiii-desktop/**'
      - '.github/workflows/test-desktop.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: wiii-desktop/package-lock.json

      - name: Install dependencies
        working-directory: wiii-desktop
        run: npm ci

      - name: Run tests
        working-directory: wiii-desktop
        run: npx vitest run

      - name: Type check
        working-directory: wiii-desktop
        run: npx tsc --noEmit
